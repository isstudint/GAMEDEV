[plugin]

name="Shader Library"
description="Browse and download shaders from godotshaders.com directly in Godot Editor"
author="Shader Library Team"
version="1.3.3"
script="plugin.gd"

[updates]

# GitHub repository for checking updates (format: username/repository)
github_repo="Kelpekk/Godot-Shader-Library"
# Set to false to disable auto-update checks
auto_check=true
